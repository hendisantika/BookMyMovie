<!DOCTYPE html>
<html lang="en" xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity4"
      xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta content="width=device-width, initial-scale=1, shrink-to-fit=no" name="viewport"/>
    <meta content="IE=edge" http-equiv="X-UA-Compatible"/>
    <title>All Movies - BookMyMovie</title>
    <link href="/favicon.svg" rel="icon" type="image/svg+xml"/>
    <link href="/images/ticket-icon.svg" rel="apple-touch-icon"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="/css/site.css" rel="stylesheet"/>
</head>
<body>
<nav class="navbar">
    <div class="container">
        <a class="navbar-brand" href="/movies">
            <img alt="BookMyMovie" height="32" src="/images/ticket-icon.svg" width="32"/>
            <span>BookMyMovie</span>
        </a>
        <ul class="nav">
            <li><a href="/movies">Home</a></li>
            <li><a class="active" href="/movies/all">All Movies</a></li>
            <li><a href="/theatres">Theatres</a></li>
        </ul>
        <ul class="nav">
            <li sec:authorize="isAnonymous()">
                <a href="/login">
                    <svg fill="currentColor" height="16" style="vertical-align: middle; margin-right: 4px;"
                         viewBox="0 0 16 16"
                         width="16">
                        <path d="M6 3.5a.5.5 0 0 1 .5-.5h8a.5.5 0 0 1 .5.5v9a.5.5 0 0 1-.5.5h-8a.5.5 0 0 1-.5-.5v-2a.5.5 0 0 0-1 0v2A1.5 1.5 0 0 0 6.5 14h8a1.5 1.5 0 0 0 1.5-1.5v-9A1.5 1.5 0 0 0 14.5 2h-8A1.5 1.5 0 0 0 5 3.5v2a.5.5 0 0 0 1 0v-2z"
                              fill-rule="evenodd"/>
                        <path d="M11.854 8.354a.5.5 0 0 0 0-.708l-3-3a.5.5 0 1 0-.708.708L10.293 7.5H1.5a.5.5 0 0 0 0 1h8.793l-2.147 2.146a.5.5 0 0 0 .708.708l3-3z"
                              fill-rule="evenodd"/>
                    </svg>
                    Login
                </a>
            </li>
            <li sec:authorize="isAuthenticated()">
                <a href="/logout">
                    <svg fill="currentColor" height="16" style="vertical-align: middle; margin-right: 4px;"
                         viewBox="0 0 16 16"
                         width="16">
                        <path d="M10 3.5a.5.5 0 0 0-.5-.5h-8a.5.5 0 0 0-.5.5v9a.5.5 0 0 0 .5.5h8a.5.5 0 0 0 .5-.5v-2a.5.5 0 0 1 1 0v2A1.5 1.5 0 0 1 9.5 14h-8A1.5 1.5 0 0 1 0 12.5v-9A1.5 1.5 0 0 1 1.5 2h8A1.5 1.5 0 0 1 11 3.5v2a.5.5 0 0 1-1 0v-2z"
                              fill-rule="evenodd"/>
                        <path d="M4.146 8.354a.5.5 0 0 1 0-.708l3-3a.5.5 0 1 1 .708.708L5.707 7.5H14.5a.5.5 0 0 1 0 1H5.707l2.147 2.146a.5.5 0 0 1-.708.708l-3-3z"
                              fill-rule="evenodd"/>
                    </svg>
                    Logout
                </a>
            </li>
        </ul>
    </div>
</nav>

<div class="container">
    <!-- Page Header -->
    <div style="margin: var(--spacing-xl) 0;">
        <h1 style="margin: 0 0 var(--spacing-sm) 0; background: var(--gradient-cinema);
                   -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;">
            Movie Collection
        </h1>
        <p style="margin: 0; color: var(--text-secondary); font-size: 1.1rem;">
            Browse all <strong th:text="${totalMovies}">54</strong> movies in our catalog
        </p>
    </div>

    <!-- Search & Filter Section -->
    <div class="card" style="margin-bottom: var(--spacing-lg);">
        <div style="display: flex; gap: var(--spacing-md); align-items: center; flex-wrap: wrap;">
            <input id="searchInput" onkeyup="filterMovies()" placeholder="Search movies..."
                   style="flex: 1; min-width: 300px; padding: var(--spacing-sm) var(--spacing-md);
                          border: 2px solid var(--border); border-radius: var(--radius-md);
                          font-size: 1rem; transition: border-color 0.2s ease;"
                   type="text"/>
            <div style="display: flex; gap: var(--spacing-sm); align-items: center;">
                <svg fill="currentColor" height="20" viewBox="0 0 16 16" width="20">
                    <path d="M11.742 10.344a6.5 6.5 0 1 0-1.397 1.398h-.001c.03.04.062.078.098.115l3.85 3.85a1 1 0 0 0 1.415-1.414l-3.85-3.85a1.007 1.007 0 0 0-.115-.1zM12 6.5a5.5 5.5 0 1 1-11 0 5.5 5.5 0 0 1 11 0z"/>
                </svg>
                <span id="resultCount" style="color: var(--text-secondary); font-size: 0.9rem;">
                    <span th:text="${totalMovies}">54</span> movies
                </span>
            </div>
        </div>
    </div>

    <!-- Movies Grid -->
    <div id="moviesGrid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
                                gap: var(--spacing-lg); margin-bottom: var(--spacing-xl);">

        <div class="movie-card" style="background: white; border-radius: var(--radius-lg); overflow: hidden;
                    box-shadow: var(--shadow-md); transition: all 0.3s ease; cursor: pointer;"
             th:attr="data-movie-name=${movie.movieName}, data-movie-tags=${movie.movieTags}"
             th:each="movie : ${movies}">

            <!-- Movie Poster -->
            <div style="position: relative; padding-top: 150%; overflow: hidden; background: var(--bg-secondary);">
                <img onerror="this.src='/images/placeholder-movie.jpg'"
                     style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover;
                            transition: transform 0.3s ease;"
                     th:alt="${movie.movieName}"
                     th:src="${movie.moviePosterUrl}"/>
                <div style="position: absolute; bottom: 0; left: 0; right: 0;
                           background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
                           padding: var(--spacing-md);">
                </div>
            </div>

            <!-- Movie Info -->
            <div style="padding: var(--spacing-md);">
                <h3 style="margin: 0 0 var(--spacing-xs) 0; font-size: 1rem; font-weight: 600;
                          color: var(--text-primary); line-height: 1.3;
                          overflow: hidden; text-overflow: ellipsis; display: -webkit-box;
                          -webkit-line-clamp: 2; -webkit-box-orient: vertical;"
                    th:text="${movie.movieName}">Movie Title</h3>

                <div style="display: flex; flex-wrap: wrap; gap: var(--spacing-xs); margin-top: var(--spacing-sm);">
                    <span style="display: inline-block; padding: 2px 8px; background: var(--bg-secondary);
                                 color: var(--text-secondary); font-size: 0.75rem; border-radius: var(--radius-sm);
                                 font-weight: 500;"
                          th:each="tag, iterStat : ${#strings.arraySplit(movie.movieTags, '|')}"
                          th:text="${tag}">Genre</span>
                </div>
            </div>

            <!-- Hover Overlay -->
            <div class="movie-overlay" style="position: absolute; top: 0; left: 0; right: 0; bottom: 0;
                                             background: rgba(0,0,0,0.7); opacity: 0;
                                             transition: opacity 0.3s ease; display: flex;
                                             align-items: center; justify-content: center;
                                             flex-direction: column; gap: var(--spacing-md);
                                             pointer-events: none;">
                <div style="text-align: center; padding: var(--spacing-md); color: white;">
                    <h4 style="margin: 0 0 var(--spacing-sm) 0; font-size: 1.1rem;"
                        th:text="${movie.movieName}">Movie Title</h4>
                    <p style="margin: 0; font-size: 0.9rem; opacity: 0.9;">Click to view showtimes</p>
                </div>
            </div>
        </div>
    </div>

    <!-- No Results Message -->
    <div id="noResults" style="display: none; text-align: center; padding: var(--spacing-xxl);
                                 background: var(--bg-secondary); border-radius: var(--radius-lg);">
        <svg fill="currentColor" height="64" style="opacity: 0.3; margin-bottom: var(--spacing-md);"
             viewBox="0 0 16 16" width="64">
            <path d="M8 15A7 7 0 1 1 8 1a7 7 0 0 1 0 14zm0 1A8 8 0 1 0 8 0a8 8 0 0 0 0 16z"/>
            <path d="M7.002 11a1 1 0 1 1 2 0 1 1 0 0 1-2 0zM7.1 4.995a.905.905 0 1 1 1.8 0l-.35 3.507a.552.552 0 0 1-1.1 0L7.1 4.995z"/>
        </svg>
        <p style="margin: 0; color: var(--text-secondary); font-size: 1.1rem;">
            No movies found matching your search
        </p>
    </div>
</div>

<footer>
    <div class="container">
        <p class="text-muted">© 2025 BookMyMovie. All rights reserved.</p>
    </div>
</footer>

<style>
    .movie-card {
        position: relative;
    }

    .movie-card:hover {
        transform: translateY(-4px);
        box-shadow: 0 12px 24px rgba(0, 0, 0, 0.15);
    }

    .movie-card:hover img {
        transform: scale(1.05);
    }

    .movie-card:hover .movie-overlay {
        opacity: 1;
        pointer-events: auto;
    }

    #searchInput:focus {
        outline: none;
        border-color: var(--primary);
    }

    .nav a.active {
        color: var(--primary);
        font-weight: 600;
    }
</style>

<script>
    function filterMovies() {
        const searchTerm = document.getElementById('searchInput').value.toLowerCase();
        const movieCards = document.querySelectorAll('.movie-card');
        let visibleCount = 0;

        movieCards.forEach(card => {
            const movieName = card.getAttribute('data-movie-name').toLowerCase();
            const movieTags = card.getAttribute('data-movie-tags').toLowerCase();

            if (movieName.includes(searchTerm) || movieTags.includes(searchTerm)) {
                card.style.display = 'block';
                visibleCount++;
            } else {
                card.style.display = 'none';
            }
        });

        // Update result count
        document.getElementById('resultCount').innerHTML = `<span>${visibleCount}</span> movies`;

        // Show/hide no results message
        document.getElementById('noResults').style.display = visibleCount === 0 ? 'block' : 'none';
        document.getElementById('moviesGrid').style.display = visibleCount === 0 ? 'none' : 'grid';
    }

    // Add click handler to navigate to movie details (future enhancement)
    document.querySelectorAll('.movie-card').forEach(card => {
        card.addEventListener('click', function () {
            const movieName = this.getAttribute('data-movie-name');
            // For now, just show an alert. In future, navigate to movie details/showtimes page
            console.log('Clicked on movie:', movieName);
        });
    });
</script>

</body>
</html>
